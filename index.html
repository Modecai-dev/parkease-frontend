<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ParkEase Login</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <!-- Custom CSS -->
     <link rel="stylesheet" href="css/index.css">
  </head>
  <body>
    <div class="wrapper">
      <!-- Logo -->
      <div class="text-center mb-3">
        <div class="logo-box">P</div>
        <div class="title">ParkEase</div>
        <div class="subtitle">Parking Management System</div>
      </div>

      <!-- Login Card -->
      <div class="card shadow-sm login-card">
        <div class="card-header pt-3 pb-2">Sign In</div>

        <div class="card-body">
          <!-- Username -->
          <label class="form-label small">Username or Email</label>
          <div class="position-relative mb-3">
            <i class="bi bi-person input-icon"></i>
            <input
              type="text"
              class="form-control"
              placeholder="Enter your username"
            />
          </div>

          <!-- Password -->
          <label class="form-label small">Password</label>
          <div class="position-relative mb-2">
            <i class="bi bi-lock input-icon"></i>
            <input
              type="password"
              class="form-control"
              placeholder="••••••••"
            />
            <i class="bi bi-eye password-eye"></i>
          </div>

          <!-- Remember -->
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" />
              <label class="form-check-label small"> Remember me </label>
            </div>

            <a href="#" class="small text-decoration-none">
              Forgot password?
            </a>
          </div>

          <!-- Sign In -->
          <button class="btn sign-btn w-100 text-white mb-3"><a href="dashboard.html">Sign In</a></button>

          <!-- Prototype -->
          <div class="prototype-box text-center">
            <div class="prototype-title mb-2">
              <i class="bi bi-info-circle"></i> PROTOTYPE ACCESS
            </div>

            <div class="row text-start">
              <div class="col-6 prototype-item">
                <strong>Admin Account</strong><br />
                admin / admin123
              </div>

              <div class="col-6 prototype-item">
                <strong>Attendant Account</strong><br />
                attendant / park2026
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer-links text-center mt-2">
        <i class="bi bi-headset"></i>
        <a href="#">Contact System Admin</a>
        &nbsp;&nbsp;|&nbsp;&nbsp;
        <a href="#">Terms of Service</a>
      </div>

      <div class="copyright text-center">
        &copy; 2024 ParkEase Solutions. All rights reserved.
      </div>
    </div>
  </body>
</html>
